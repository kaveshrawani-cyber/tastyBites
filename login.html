<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login / Register</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .container {
      width: 100%;
      max-width: 420px;
    }

    h1 {
      text-align: center;
      font-size: 22px;
      font-weight: 500;
      margin-bottom: 1.5rem;
      color: #1a1a1a;
    }

    .tabs {
      display: flex;
      border-bottom: 1px solid #e0e0d8;
      margin-bottom: 1.5rem;
    }

    .tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      font-size: 14px;
      cursor: pointer;
      color: #888;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
    }

    .tab.active {
      color: #1a1a1a;
      border-bottom: 2px solid #1a1a1a;
      font-weight: 500;
    }

    .card {
      background: #fff;
      border: 1px solid #e0e0d8;
      border-radius: 12px;
      padding: 1.5rem;
    }

    .form { display: none; }
    .form.active { display: block; }

    .field { margin-bottom: 1rem; }

    label {
      display: block;
      font-size: 13px;
      color: #555;
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      color: #1a1a1a;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus { border-color: #888; }

    .btn {
      width: 100%;
      padding: 10px;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: opacity 0.15s;
    }

    .btn:hover { opacity: 0.85; }

    .msg {
      font-size: 13px;
      margin-top: 1rem;
      padding: 10px 12px;
      border-radius: 8px;
      display: none;
    }

    .msg.error { background: #fef2f2; color: #b91c1c; display: block; }
    .msg.success { background: #f0fdf4; color: #15803d; display: block; }

    .footer {
      text-align: center;
      font-size: 12px;
      color: #aaa;
      margin-top: 1.5rem;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Welcome</h1>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('login')">Login</button>
    <button class="tab" onclick="switchTab('register')">Register</button>
  </div>

  <div class="card">

    <!-- LOGIN FORM -->
    <form id="login-form" class="form active" action="auth.php" method="POST">
      <div class="field">
        <label for="login-email">Email address</label>
        <input type="email" id="login-email" name="email" placeholder="you@example.com" required />
      </div>
      <div class="field">
        <label for="login-pass">Password</label>
        <input type="password" id="login-pass" name="password" placeholder="••••••••" required />
      </div>
      <button type="submit" name="login" class="btn">Sign in</button>
      <div id="login-msg" class="msg"></div>
    </form>

    <!-- REGISTER FORM -->
    <form id="register-form" class="form" action="auth.php" method="POST">
      <div class="field">
        <label for="reg-name">Full name</label>
        <input type="text" id="reg-name" name="name" placeholder="Jane Doe" required />
      </div>
      <div class="field">
        <label for="reg-email">Email address</label>
        <input type="email" id="reg-email" name="email" placeholder="you@example.com" required />
      </div>
      <div class="field">
        <label for="reg-pass">Password</label>
        <input type="password" id="reg-pass" name="password" placeholder="Min. 8 characters" minlength="8" required />
      </div>
      <button type="submit" name="register" class="btn">Create account</button>
      <div id="reg-msg" class="msg"></div>
    </form>

  </div>

  <p class="footer">Submits to auth.php via POST</p>
</div>

<script>
  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
    });
    document.getElementById('login-form').classList.toggle('active', tab === 'login');
    document.getElementById('register-form').classList.toggle('active', tab === 'register');
  }

  // Optional: show PHP echo messages inline if passed via URL param
  // e.g. auth.php?error=Invalid+Password
  const params = new URLSearchParams(window.location.search);
  if (params.get('error')) {
    const msg = document.getElementById('login-msg');
    msg.className = 'msg error';
    msg.textContent = params.get('error');
  }
  if (params.get('success')) {
    const msg = document.getElementById('reg-msg');
    msg.className = 'msg success';
    msg.textContent = params.get('success');
    switchTab('register');
  }
</script>

</body>
</html>
