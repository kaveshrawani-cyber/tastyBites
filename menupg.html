<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restaurant Menu</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f0;
      color: #1a1a1a;
      padding: 1.5rem 1rem;
      max-width: 680px;
      margin: 0 auto;
    }

    h1 {
      font-size: 22px;
      font-weight: 500;
      margin-bottom: 1.5rem;
    }

    /* Cart bar */
    .cart-bar {
      background: #fff;
      border: 1px solid #e0e0d8;
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .cart-count { font-size: 14px; color: #555; }
    .cart-count strong { color: #1a1a1a; }

    /* Category sections */
    .cat-section { margin-bottom: 2rem; }

    .cat-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 0.75rem;
      padding-bottom: 8px;
      border-bottom: 1px solid #e0e0d8;
    }

    .cat-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: #f0efe8;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    h2 { font-size: 18px; font-weight: 500; }

    /* Menu items */
    .menu-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: #fff;
      border: 1px solid #e0e0d8;
      border-radius: 8px;
      margin-bottom: 8px;
    }

    .item-name { font-size: 14px; font-weight: 500; }
    .item-price { font-size: 13px; color: #777; margin-top: 2px; }

    .add-btn {
      padding: 6px 16px;
      font-size: 13px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: transparent;
      cursor: pointer;
      color: #1a1a1a;
      transition: background 0.12s, color 0.12s;
    }

    .add-btn:hover { background: #f0efe8; }

    .add-btn.added {
      background: #f0fdf4;
      color: #15803d;
      border-color: #86efac;
    }

    /* Order section */
    .order-section {
      background: #fff;
      border: 1px solid #e0e0d8;
      border-radius: 12px;
      padding: 1.25rem;
      margin-top: 1rem;
    }

    .order-title { font-size: 15px; font-weight: 500; margin-bottom: 1rem; }

    .radio-group { display: flex; gap: 20px; margin-bottom: 1rem; }

    .radio-opt {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      cursor: pointer;
    }

    .radio-opt input { cursor: pointer; }

    .proceed-btn {
      width: 100%;
      padding: 11px;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .proceed-btn:hover { opacity: 0.85; }

    .error-msg {
      font-size: 13px;
      color: #b91c1c;
      margin-top: 10px;
      display: none;
    }
  </style>
</head>
<body>

<h1>Restaurant Menu</h1>

<div class="cart-bar">
  <div class="cart-count">Cart: <strong id="cart-count">0</strong> item(s)</div>
  <div style="font-size: 12px; color: #aaa;">Session-based cart</div>
</div>

<div id="menu-sections"></div>

<div class="order-section">
  <div class="order-title">Select order type</div>
  <div class="radio-group">
    <label class="radio-opt">
      <input type="radio" name="order_type" value="Dine-In" /> Dine-in
    </label>
    <label class="radio-opt">
      <input type="radio" name="order_type" value="Home Delivery" /> Home delivery
    </label>
  </div>
  <button class="proceed-btn" onclick="handleProceed()">Proceed to payment</button>
  <div class="error-msg" id="order-error">Please select an order type before proceeding.</div>
</div>

<script>
  /*
   * In production this data comes from PHP:
   *   $result = $conn->query("SELECT * FROM food_menus WHERE category='$cat'");
   * Replace the arrays below with PHP-generated JSON or server-rendered HTML.
   */
  const categories = [
    {
      name: 'Pizza', icon: '🍕',
      items: [
        { id: 1, name: 'Margherita', price: 199 },
        { id: 2, name: 'Pepperoni', price: 249 },
        { id: 3, name: 'BBQ Chicken', price: 279 }
      ]
    },
    {
      name: 'Burger', icon: '🍔',
      items: [
        { id: 4, name: 'Veg Burger', price: 129 },
        { id: 5, name: 'Chicken Burger', price: 159 },
        { id: 6, name: 'Double Patty', price: 199 }
      ]
    },
    {
      name: 'Noodles', icon: '🍜',
      items: [
        { id: 7, name: 'Veg Hakka', price: 149 },
        { id: 8, name: 'Chicken Noodles', price: 179 }
      ]
    },
    {
      name: 'Dessert', icon: '🍰',
      items: [
        { id: 9, name: 'Gulab Jamun', price: 89 },
        { id: 10, name: 'Ice Cream', price: 99 }
      ]
    },
    {
      name: 'Drinks', icon: '🥤',
      items: [
        { id: 11, name: 'Cold Coffee', price: 79 },
        { id: 12, name: 'Fresh Lime Soda', price: 59 },
        { id: 13, name: 'Mango Shake', price: 99 }
      ]
    }
  ];

  let cart = [];

  function renderMenu() {
    const container = document.getElementById('menu-sections');
    container.innerHTML = categories.map(cat => `
      <div class="cat-section">
        <div class="cat-header">
          <div class="cat-icon">${cat.icon}</div>
          <h2>${cat.name}</h2>
        </div>
        ${cat.items.map(item => `
          <div class="menu-item" id="item-${item.id}">
            <div>
              <div class="item-name">${item.name}</div>
              <div class="item-price">&#8377;${item.price}</div>
            </div>
            <button class="add-btn" onclick="addToCart(${item.id}, this)">Add to cart</button>
          </div>
        `).join('')}
      </div>
    `).join('');
  }

  function addToCart(foodId, btn) {
    cart.push(foodId);
    btn.textContent = 'Added';
    btn.classList.add('added');
    document.getElementById('cart-count').textContent = cart.length;

    /*
     * To POST to PHP backend, you can submit a hidden form here:
     *
     * const form = document.createElement('form');
     * form.method = 'POST';
     * form.action = 'menu.php';
     * const input = document.createElement('input');
     * input.type = 'hidden';
     * input.name = 'food_id';
     * input.value = foodId;
     * form.appendChild(input);
     * const btn2 = document.createElement('button');
     * btn2.name = 'add';
     * btn2.type = 'submit';
     * form.appendChild(btn2);
     * document.body.appendChild(form);
     * btn2.click();
     */
  }

  function handleProceed() {
    const chosen = document.querySelector('input[name="order_type"]:checked');
    const errEl = document.getElementById('order-error');
    if (!chosen) {
      errEl.style.display = 'block';
      return;
    }
    errEl.style.display = 'none';

    /*
     * In production: submit a form to payment.php with order_type + cart data.
     * Example:
     *   <form action="payment.php" method="POST">
     *     <input type="hidden" name="order_type" value="...">
     *     <input type="hidden" name="cart" value="...">
     *   </form>
     *
     * Or use fetch() to POST JSON to your API endpoint.
     */
    alert('Order type: ' + chosen.value + '\nProceeding to payment Page...');
    window.location.href = 'payment.html?order_type=' + encodeURIComponent(chosen.value);
  }

  renderMenu();
</script>

</body>
</html>
